<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="wrapper">
        <h1><u>TIC TAC TOE</u></h1>
        <div class="scoreboard">
          <h3>SCORES</h3>
          <p>X : <span id="xScore">0</span></p>
          <p>O : <span id="oScore">0</span></p>
        </div>
        <div class="board">
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
        </div>
        <br />
        <button id="restartBtn">RESTART</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
